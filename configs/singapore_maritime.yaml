# Bootstrap maritime dataset (Singapore Maritime Dataset, Roboflow export v5).
# License: Public Domain. Source:
# https://universe.roboflow.com/lyx-limyixian-gmail-com/singapore-maritime/dataset/5
#
# Used to bootstrap a buoy/boat detector before fine-tuning on Nordic USV's own
# footage. `path` is relative to the repo root; boat_vision.train resolves it to an
# absolute path at runtime so it works on any machine (Mac dev, Windows boat PC, CI).
path: data/datasets/_downloads/singapore_maritime_v5
train: train/images
val: valid/images
test: test/images

nc: 9
names:
  - Boat
  - Buoy
  - Ferry
  - Flying bird-plane
  - Kayak
  - Other
  - Sail boat
  - Speed boat
  - Vessel-ship
