# Copy to configs/windows_cameras.local.yaml on the Windows PC and fill in the
# real RTSP URLs. configs/*.local.yaml is gitignored.

app:
  host: 127.0.0.1
  port: 8765
  model: models/maritime/best.pt
  confidence_threshold: 0.35
  iou_threshold: 0.45
  image_size: 640
  device: 0
  output_jsonl: outputs/events/live_detections.jsonl
  jpeg_quality: 80
  demo_findings: false
  # Passive training-data collection: save a clean frame every N seconds per
  # camera to data/datasets/maritime/raw_frames/<camera>/ (oldest rotate out).
  auto_capture: false
  auto_capture_interval: 10
  auto_capture_max: 500

dashboard:
  columns: "2"
  show_events: false
  card_min_width: 420
  view_mode: workspace
  show_labels: true
  show_status: true

cameras:
  - camera_id: bow_camera
    name: Bow Camera
    source: rtsp://username:password@192.168.x.x:554/stream1
    enabled: true
    allowed_classes:
      - boat
      - ship
      - sailboat
      - small_vessel
      - kayak
      - navigation_buoy
      - red_lateral_mark
      - green_lateral_mark
      - cardinal_mark
      - special_mark
      - floating_object
      - person
    ignore_zones: []

  - camera_id: stern_camera
    name: Stern Camera
    source: rtsp://username:password@192.168.x.y:554/stream1
    enabled: true
    allowed_classes:
      - boat
      - ship
      - sailboat
      - small_vessel
      - kayak
      - navigation_buoy
      - red_lateral_mark
      - green_lateral_mark
      - cardinal_mark
      - special_mark
      - floating_object
      - person
    ignore_zones: []

  - camera_id: port_camera
    name: Port Camera
    source: rtsp://username:password@192.168.x.z:554/stream1
    enabled: true
    allowed_classes:
      - boat
      - ship
      - sailboat
      - small_vessel
      - kayak
      - navigation_buoy
      - red_lateral_mark
      - green_lateral_mark
      - cardinal_mark
      - special_mark
      - floating_object
      - person
    ignore_zones: []

  - camera_id: starboard_camera
    name: Starboard Camera
    source: rtsp://username:password@192.168.x.w:554/stream1
    enabled: true
    allowed_classes:
      - boat
      - ship
      - sailboat
      - small_vessel
      - kayak
      - navigation_buoy
      - red_lateral_mark
      - green_lateral_mark
      - cardinal_mark
      - special_mark
      - floating_object
      - person
    ignore_zones: []
