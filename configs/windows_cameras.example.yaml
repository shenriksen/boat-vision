# Copy to configs/windows_cameras.local.yaml on the Windows PC and fill in the
# real RTSP URLs. configs/*.local.yaml is gitignored.

app:
  host: 127.0.0.1
  port: 8765
  model: models/maritime/best.pt
  confidence_threshold: 0.35
  iou_threshold: 0.45
  image_size: 640
  device: 0
  output_jsonl: outputs/events/live_detections.jsonl
  jpeg_quality: 80
  demo_findings: false
  # Passive training-data collection: save a clean frame every N seconds per
  # camera to data/datasets/maritime/raw_frames/<camera>/ (oldest rotate out).
  auto_capture: false
  auto_capture_interval: 10
  auto_capture_max: 500
  # --- Latency knobs (low-latency live feed) ---
  inference_cooldown: 0.25  # rest between AI passes; set 0 on GPU for lowest detection latency
  display_jpeg_quality: 90  # live-view JPEG quality (same as before — no quality regression);
                            # lower only if you want faster encode/transfer at some image cost
  ai_max_infer_width: 0     # OPT-IN: cap the enhance+inference frame width (e.g. 960). 0 = full res.
                            # Operator video stays full-res; detection boxes are scaled back.
                            # Off by default so small/distant objects stay as detectable as now.
  profile: false            # expose per-stage latency (p50/p95/p99) at GET /perf.json
  # AI-only image processing (the operator always sees the clean, raw video).
  ai_enhance: true          # auto-level exposure + rotate day/low-light/anti-glare/haze
                            # profiles so changing weather/light can't blind the AI
  color_buoy_radar: false   # OPT-IN: vivid-colour buoy radar. Good for a lone buoy in open water,
                            # but floods false "seamarks" in a marina — turn on only offshore.
  color_buoy_threshold: 12  # min local colour-contrast to count (lower = more sensitive)
  color_buoy_max: 6         # keep only the N strongest colour candidates per frame
  # Tracking with confidence hysteresis — stable live detection (no flicker, holds
  # through brief occlusions). High bar to start a track, low bar to keep it.
  track_start_conf: 0.60    # confidence needed to START a new track
  track_keep_conf: 0.35     # confidence needed to SUSTAIN an existing track
  track_confirm_hits: 3     # seen in N of last `track_confirm_window` passes before alarm
  track_confirm_window: 5
  track_buffer: 15          # keep coasting a lost track this many passes (occlusion)
  track_match_dist: 0.06    # max centre move to match a track (fraction of frame width)

dashboard:
  columns: "2"
  show_events: false
  card_min_width: 420
  view_mode: workspace
  show_labels: true
  show_status: true

cameras:
  - camera_id: bow_camera
    name: Bow Camera
    source: rtsp://username:password@192.168.x.x:554/stream1
    enabled: true
    allowed_classes:
      - boat
      - ship
      - sailboat
      - small_vessel
      - kayak
      - navigation_buoy
      - red_lateral_mark
      - green_lateral_mark
      - cardinal_mark
      - special_mark
      - floating_object
      - person
    ignore_zones: []

  - camera_id: stern_camera
    name: Stern Camera
    source: rtsp://username:password@192.168.x.y:554/stream1
    enabled: true
    allowed_classes:
