name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build BoatVision.exe (launcher)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pyinstaller --onefile --noconsole --name BoatVision --icon boat_vision/static/app_icon.ico launcher.py
          Copy-Item dist\BoatVision.exe BoatVision.exe -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\boatvision.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoatVisionSetup
          path: installer/Output/BoatVisionSetup.exe

      - name: Publish release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Boat Vision Setup v1.0.${{ github.run_number }}
          files: installer/Output/BoatVisionSetup.exe
