name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set version
        shell: pwsh
        run: |
          $v = "1.1.$env:GITHUB_RUN_NUMBER"
          [System.IO.File]::WriteAllText("VERSION", $v)
          echo "APPVER=$v" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pywebview pyinstaller

      - name: Build folder app (onedir)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --windowed --name BoatVision `
            --icon boat_vision/static/app_icon.ico `
            --collect-all ultralytics --collect-all torch --collect-all torchvision `
            --collect-all cv2 --collect-all webview --collect-all av `
            --collect-submodules boat_vision --collect-data boat_vision `
            --copy-metadata ultralytics --copy-metadata torch --copy-metadata numpy `
            --add-data "yolo26n.pt;." --add-data "yolo26s.pt;." --add-data "VERSION;." `
            --add-data "configs/windows_cameras.example.yaml;configs" `
            app_native.py

      - name: Build single-file EXE (onefile)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "BoatVision-${env:APPVER}" `
            --icon boat_vision/static/app_icon.ico `
            --collect-all ultralytics --collect-all torch --collect-all torchvision `
            --collect-all cv2 --collect-all webview --collect-all av `
            --collect-submodules boat_vision --collect-data boat_vision `
            --copy-metadata ultralytics --copy-metadata torch --copy-metadata numpy `
            --add-data "yolo26n.pt;." --add-data "yolo26s.pt;." --add-data "VERSION;." `
            --add-data "configs/windows_cameras.example.yaml;configs" `
            app_native.py

      - name: Make portable ZIP
        shell: pwsh
        run: Compress-Archive -Path dist\BoatVision\* -DestinationPath "BoatVision-${env:APPVER}-portable.zip"

      - name: Install WiX
        run: choco install wixtoolset -y --no-progress

      - name: Build MSI
        shell: pwsh
        run: |
          $wix = "$env:WIX" + "bin"
          if (-not (Test-Path $wix)) { $wix = "C:\Program Files (x86)\WiX Toolset v3.14\bin" }
          New-Item -ItemType Directory -Force obj | Out-Null
          & "$wix\heat.exe" dir dist\BoatVision -cg AppFiles -dr INSTALLDIR -gg -sfrag -srd -scom -sreg -var var.SourceDir -out files.wxs
          & "$wix\candle.exe" -dSourceDir=dist\BoatVision "-dAppVersion=${env:APPVER}.0" installer\product.wxs files.wxs -out obj\
          & "$wix\light.exe" -sval obj\product.wixobj obj\files.wixobj -out "BoatVision-${env:APPVER}.msi"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Fetch bundled Python for installer
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.12.7/python-3.12.7-amd64.exe" -OutFile "installer\python-3.12.7-amd64.exe"

      - name: Build GPU installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & "$iscc" "/dMyAppVersion=${env:APPVER}" installer\boatvision.iss

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "dist\BoatVision-${env:APPVER}.exe" "release\BoatVision-${env:APPVER}.exe"
          Copy-Item "BoatVision-${env:APPVER}-portable.zip" release\
          Copy-Item "BoatVision-${env:APPVER}.msi" release\
          Copy-Item "installer\Output\BoatVisionSetup.exe" "release\BoatVision-GPU-Setup-${env:APPVER}.exe"
          Get-ChildItem release | Format-Table Name,Length

      - uses: actions/upload-artifact@v4
        with:
          name: BoatVision-Windows
          path: release/*

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.${{ github.run_number }}
          name: Boat Vision v1.1.${{ github.run_number }}
          files: release/*
